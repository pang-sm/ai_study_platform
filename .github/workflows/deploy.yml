# Actions 列表标题来自 push 时的 commit message。
# 为确保部署记录可读、可回档，提交信息请写清楚中文说明，例如：
#   - 优化登录注册页面样式
#   - 将资料库嵌入课程工作台
#   - 自动沉淀AI学习记录
# 回档时可根据 Actions 列表中的中文标题和 commit hash 找到目标版本。

name: 自动部署

run-name: 部署：${{ github.event.head_commit.message }}

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: 写入部署摘要
        run: |
          echo "## 本次部署信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 分支：${GITHUB_REF_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交说明：${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "- 提交人：${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式：${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: 打印最近版本记录
        run: git log --oneline -5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Check backend Python syntax
        run: python -m py_compile backend/*.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT || '22' }}
        run: |
          set -euo pipefail

          : "${TENCENT_HOST:?TENCENT_HOST secret is required}"
          : "${TENCENT_SSH_KEY:?TENCENT_SSH_KEY secret is required}"
          SSH_PORT="${SSH_PORT:-22}"

          # Strip trailing dot/port/path from host (e.g. root@ip → ip, ip:22 → ip)
          HOST_CLEAN="${TENCENT_HOST#*@}"
          HOST_CLEAN="${HOST_CLEAN%%:*}"
          HOST_CLEAN="${HOST_CLEAN%%/*}"
          echo "SSH target: $HOST_CLEAN port $SSH_PORT"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          printf '%s\n' "$TENCENT_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"

          echo "Checking SSH connectivity..."
          timeout 10 bash -c "cat < /dev/null > /dev/tcp/$HOST_CLEAN/$SSH_PORT" 2>/dev/null \
            && echo "SSH port reachable" \
            || echo "Warning: TCP check skipped or port unreachable (will retry via ssh-keyscan)"

          echo "Running ssh-keyscan..."
          if ! ssh-keyscan -T 20 -p "$SSH_PORT" -H "$HOST_CLEAN" >> "$HOME/.ssh/known_hosts" 2>/tmp/ssh-keyscan.err; then
            echo "ssh-keyscan failed. Check TENCENT_HOST / SSH_PORT / server SSH accessibility."
            echo "TENCENT_HOST is set: yes (length ${#TENCENT_HOST})"
            echo "Cleaned host: $HOST_CLEAN"
            echo "SSH_PORT: $SSH_PORT"
            echo "--- ssh-keyscan stderr ---"
            cat /tmp/ssh-keyscan.err || true
            exit 1
          fi
          chmod 644 "$HOME/.ssh/known_hosts"
          echo "ssh-keyscan succeeded"

      - name: Deploy to Tencent Cloud
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT || '22' }}
          ADMIN_LOGIN_CODE: ${{ secrets.ADMIN_LOGIN_CODE }}
        run: |
          set -euo pipefail

          : "${TENCENT_HOST:?TENCENT_HOST secret is required}"
          : "${TENCENT_USER:?TENCENT_USER secret is required}"
          SSH_PORT="${SSH_PORT:-22}"
          ADMIN_CODE="${ADMIN_LOGIN_CODE:-}"
          HOST_CLEAN="${TENCENT_HOST#*@}"
          HOST_CLEAN="${HOST_CLEAN%%:*}"

          # Pass ADMIN_LOGIN_CODE as env var to the remote session
          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$HOST_CLEAN" \
            ADMIN_LOGIN_CODE="$ADMIN_CODE" 'bash -se' <<'DEPLOYEOF'
          set -euo pipefail

          cd ~/ai_study_platform

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          if ! command -v tesseract >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tesseract-ocr tesseract-ocr-chi-sim
          fi

          echo "=== 安装后端Python依赖 ==="
          if [ -x "backend/.venv/bin/pip" ]; then
            echo "[deploy] 使用 backend/.venv/bin/pip"
            backend/.venv/bin/pip install -r backend/requirements.txt
          elif [ -x ".venv/bin/pip" ]; then
            echo "[deploy] 使用 .venv/bin/pip"
            .venv/bin/pip install -r backend/requirements.txt
          elif [ -x "venv/bin/pip" ]; then
            echo "[deploy] 使用 venv/bin/pip"
            venv/bin/pip install -r backend/requirements.txt
          else
            echo "[deploy] 未找到虚拟环境，使用系统 python3"
            python3 -m pip install -r backend/requirements.txt
          fi
          echo "=== 依赖安装完成 ==="

          cd frontend
          npm ci
          npm run build
          cd ..

          sudo mkdir -p /var/www/ai_study_platform
          sudo rsync -a --delete frontend/dist/ /var/www/ai_study_platform/

          # ── Configure ADMIN_LOGIN_CODE for systemd service ──
          if [ -n "${ADMIN_LOGIN_CODE:-}" ]; then
            echo "[deploy] Configuring ADMIN_LOGIN_CODE in systemd drop-in..."
            sudo mkdir -p /etc/systemd/system/ai-backend.service.d
            sudo tee /etc/systemd/system/ai-backend.service.d/admin-code.conf > /dev/null <<INNEREOF
          [Service]
          Environment="ADMIN_LOGIN_CODE=${ADMIN_LOGIN_CODE}"
          INNEREOF
            sudo systemctl daemon-reload
            echo "[deploy] ADMIN_LOGIN_CODE configured via systemd drop-in"
          else
            echo "[deploy] ADMIN_LOGIN_CODE secret is empty — skipping config"
          fi

          sudo systemctl restart ai-backend
          sudo systemctl is-active --quiet ai-backend

          curl -fsS http://127.0.0.1 >/dev/null
          DEPLOYEOF
