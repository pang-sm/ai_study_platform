name: 设置管理员姓名（一次性任务）
run-name: 设置 admin 用户的 admin_real_name

on:
  push:
    paths:
      - '.github/workflows/set-admin-name.yml'

jobs:
  set-admin-name:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?required}"
          : "${TENCENT_SSH_KEY:?required}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$TENCENT_SSH_KEY" > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"
          ssh-keyscan -p "$SSH_PORT" "$TENCENT_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Set admin_real_name
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$TENCENT_HOST" 'bash -se' <<'EOF'
          set -euo pipefail

          echo "=== 定位数据库 ==="
          DB_PATH="$HOME/ai_study_platform/backend/app.db"
          if [ ! -f "$DB_PATH" ]; then
            DB_PATH=$(find "$HOME" -path "*/backend/app.db" -type f 2>/dev/null | head -1)
          fi
          if [ ! -f "$DB_PATH" ]; then
            echo "ERROR: 找不到数据库文件"
            exit 1
          fi
          echo "数据库路径: $DB_PATH"

          echo ""
          echo "=== 查询 admin 用户（设置前） ==="
          sqlite3 "$DB_PATH" "SELECT username, is_admin, plan, admin_role, admin_real_name FROM users WHERE username='admin';"

          echo ""
          echo "=== 设置 admin_real_name ==="
          sqlite3 "$DB_PATH" "UPDATE users SET admin_real_name='逄森淼' WHERE username='admin';"

          echo ""
          echo "=== 查询 admin 用户（设置后） ==="
          sqlite3 "$DB_PATH" "SELECT username, is_admin, plan, admin_role, admin_real_name FROM users WHERE username='admin';"

          echo ""
          echo "=== 重启 ai-backend ==="
          sudo systemctl restart ai-backend
          sudo systemctl is-active --quiet ai-backend && echo "ai-backend 重启成功" || echo "ERROR: ai-backend 重启失败"

          echo ""
          echo "=== 健康检查 ==="
          curl -fsS http://127.0.0.1/api/health
          EOF
