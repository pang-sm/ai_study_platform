name: 设置管理员姓名（一次性任务）
run-name: 设置 admin 用户的 admin_real_name

on:
  push:
    paths:
      - '.github/workflows/set-admin-name.yml'

jobs:
  set-admin-name:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?required}"
          : "${TENCENT_SSH_KEY:?required}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$TENCENT_SSH_KEY" > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"
          ssh-keyscan -p "$SSH_PORT" "$TENCENT_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Set admin_real_name
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$TENCENT_HOST" 'bash -se' <<'EOF'
          set -euo pipefail
          cd ~/ai_study_platform
          DB="$(pwd)/backend/app.db"
          echo "DB: $DB"
          echo "=== BEFORE ==="
          sqlite3 "$DB" "SELECT username, is_admin, plan, admin_role, admin_real_name FROM users WHERE username='admin';"
          echo "=== UPDATE ==="
          sqlite3 "$DB" "UPDATE users SET admin_real_name=X'E98085E6A3AEE6B7BC' WHERE username='admin';"
          echo "=== AFTER ==="
          sqlite3 "$DB" "SELECT username, is_admin, plan, admin_role, admin_real_name FROM users WHERE username='admin';"
          echo "=== RESTART ==="
          sudo systemctl restart ai-backend && echo "OK"
          curl -s http://127.0.0.1/api/health
          EOF
