name: 管理员登录诊断 v2
on:
  push:
    paths:
      - '.github/workflows/diag-admin.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?}" ; : "${TENCENT_SSH_KEY:?}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$TENCENT_SSH_KEY" > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"
          ssh-keyscan -p "$SSH_PORT" "$TENCENT_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Fix and restart
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$TENCENT_HOST" '
          set -euo pipefail

          echo "=== 1. 查看 ai-backend 状态 ==="
          sudo systemctl status ai-backend --no-pager -l 2>&1 | head -20 || echo "无法获取状态"

          echo ""
          echo "=== 2. 找到真实 db ==="
          WORKDIR=$(sudo systemctl show ai-backend -p WorkingDirectory --value 2>/dev/null || echo "")
          echo "WorkingDirectory: [$WORKDIR]"
          if [ -z "$WORKDIR" ]; then WORKDIR="/root/ai_study_platform/backend"; fi
          DB="$WORKDIR/app.db"
          if [ ! -f "$DB" ]; then
            DB=$(find / -maxdepth 6 -name "app.db" -path "*/backend/*" -type f 2>/dev/null | head -1)
          fi
          echo "实际数据库: $DB"
          ls -la "$DB" 2>/dev/null || echo "文件不存在!"

          echo ""
          echo "=== 3. 查看 admin ==="
          if [ -f "$DB" ]; then
            sqlite3 "$DB" "SELECT '"'"'is_admin:'"'"', is_admin FROM users WHERE username='"'"'admin'"'"';" 2>/dev/null || echo "查询失败"
            sqlite3 "$DB" "SELECT '"'"'plan:'"'"', plan FROM users WHERE username='"'"'admin'"'"';" 2>/dev/null
            sqlite3 "$DB" "SELECT '"'"'admin_role:'"'"', admin_role FROM users WHERE username='"'"'admin'"'"';" 2>/dev/null
            NAMELEN=$(sqlite3 "$DB" "SELECT length(COALESCE(admin_real_name,'"'"''"'"')) FROM users WHERE username='"'"'admin'"'"';" 2>/dev/null || echo "0")
            echo "admin_real_name 长度: $NAMELEN"
            NAMEHEX=$(sqlite3 "$DB" "SELECT hex(COALESCE(admin_real_name,'"'"''"'"')) FROM users WHERE username='"'"'admin'"'"';" 2>/dev/null || echo "")
            echo "admin_real_name hex: $NAMEHEX"
          fi

          echo ""
          echo "=== 4. 修复 admin ==="
          if [ -f "$DB" ]; then
            sqlite3 "$DB" "UPDATE users SET is_admin=1, plan='"'"'admin'"'"', admin_role='"'"'super_admin'"'"', admin_real_name=X'"'"'E98085E6A3AEE6B7BC'"'"' WHERE username='"'"'admin'"'"';" 2>/dev/null && echo "UPDATE OK" || echo "UPDATE FAILED"
          fi

          echo ""
          echo "=== 5. 重启服务 ==="
          sudo systemctl daemon-reload 2>/dev/null || true
          sudo systemctl restart ai-backend 2>&1 || echo "重启命令执行出错"
          sleep 4
          sudo systemctl is-active ai-backend && echo "ACTIVE: yes" || echo "ACTIVE: no"
          curl -s -o /dev/null -w "健康检查: %{http_code}\n" http://127.0.0.1/api/health || echo "健康检查失败"
          '