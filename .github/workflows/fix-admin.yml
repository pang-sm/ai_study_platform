name: 修复管理员姓名并重置密码
on:
  push:
    paths:
      - '.github/workflows/fix-admin.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bcrypt
        run: pip install bcrypt

      - name: Generate new password
        id: gen
        run: |
          python3 -c "
          import secrets, string, bcrypt
          pw = ''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(16))
          h = bcrypt.hashpw(pw.encode(), bcrypt.gensalt()).decode()
          with open('/tmp/new_pwd.txt','w') as f: f.write(pw)
          with open('/tmp/new_hash.txt','w') as f: f.write(h)
          print(f'Password generated ({len(pw)} chars)')
          "

      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?}" ; : "${TENCENT_SSH_KEY:?}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$TENCENT_SSH_KEY" > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"
          ssh-keyscan -p "$SSH_PORT" "$TENCENT_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Fix DB and verify login
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"

          # Copy hash hex to server
          python3 -c "
          h = open('/tmp/new_hash.txt').read().strip()
          open('/tmp/hash_hex.txt','w').write(h.encode().hex())
          "
          scp -i "$HOME/.ssh/tencent_deploy_key" -P "$SSH_PORT" /tmp/hash_hex.txt "$TENCENT_USER@$TENCENT_HOST:/tmp/hash_hex.txt"

          PW=$(cat /tmp/new_pwd.txt)

          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$TENCENT_HOST" 'bash -se' << 'ENDSCRIPT'
          set -eo pipefail
          cd ~/ai_study_platform/backend
          DB="$(pwd)/app.db"
          echo "DB: $DB"

          echo "=== 1. 修复前 ==="
          sqlite3 "$DB" "SELECT username, is_admin, plan, admin_role, admin_real_name, hex(admin_real_name) FROM users WHERE username='admin';"

          echo "=== 2. 用 Python 安全更新 ==="
          python3 -c "
          import sqlite3
          hexhash = open('/tmp/hash_hex.txt').read().strip()
          hash_text = bytes.fromhex(hexhash).decode('utf-8')
          c = sqlite3.connect('$DB')
          c.execute('UPDATE users SET hashed_password=?, is_admin=1, plan=?, admin_role=?, admin_real_name=? WHERE username=?',
            (hash_text, 'admin', 'super_admin', '逄森淼', 'admin'))
          c.commit()
          r = c.execute('SELECT username, is_admin, plan, admin_role, admin_real_name, hex(admin_real_name) FROM users WHERE username=?',('admin',)).fetchone()
          print(f'User: {r[0]}  is_admin={r[1]}  plan={r[2]}  admin_role={r[3]}')
          print(f'admin_real_name: [{r[4]}]')
          print(f'hex: {r[5]}')
          c.close()
          "
          rm -f /tmp/hash_hex.txt

          echo "=== 3. 重启 ==="
          sudo systemctl restart ai-backend
          sleep 4
          curl -s http://127.0.0.1/api/health
          echo ""
          ENDSCRIPT

          echo ""
          echo "=== 4. 验证登录 ==="
          sleep 2
          python3 -c "
          import json, urllib.request
          pw = open('/tmp/new_pwd.txt').read().strip()
          body = json.dumps({'username':'admin','password':pw,'admin_name':'逄森淼'}).encode()
          req = urllib.request.Request('http://101.32.190.42/api/admin/login', data=body,
              headers={'Content-Type':'application/json'}, method='POST')
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              data = json.loads(resp.read())
              verified = data.get('profile',{}).get('admin_verified', False) or data.get('user',{}).get('admin_verified', False)
              print(f'admin_verified: {verified}')
              if verified:
                  print('LOGIN SUCCESS')
              else:
                  print('LOGIN FAILED: admin_verified not in response')
                  print(f'Response keys: {list(data.keys())}')
          except urllib.error.HTTPError as e:
              print(f'HTTP {e.code}: {e.read().decode()[:200]}')
          "

          echo ""
          echo "========== NEW PASSWORD =========="
          echo "$PW"
          echo "=================================="