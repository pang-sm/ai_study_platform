name: 重置管理员密码
on:
  push:
    paths:
      - '.github/workflows/reset-admin-pwd.yml'

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bcrypt
        run: pip install bcrypt

      - name: Generate password hash
        id: gen
        shell: bash
        run: |
          python3 << 'PYEOF'
          import secrets, string
          import bcrypt
          pw = "".join(secrets.choice(string.ascii_letters + string.digits) for _ in range(16))
          h = bcrypt.hashpw(pw.encode(), bcrypt.gensalt()).decode()
          hexh = h.encode().hex()
          with open("/tmp/new_pwd.txt", "w") as f: f.write(pw)
          with open("/tmp/new_hash.txt", "w") as f: f.write(hexh)
          print(f"Password generated (16 chars), hash hex: {len(hexh)} chars")
          PYEOF

      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?}" ; : "${TENCENT_SSH_KEY:?}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$TENCENT_SSH_KEY" > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"
          ssh-keyscan -p "$SSH_PORT" "$TENCENT_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Apply to server
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          HASH=$(cat /tmp/new_hash.txt)
          PW=$(cat /tmp/new_pwd.txt)

          echo "$HASH" > /tmp/hash_hex.txt
          scp -i "$HOME/.ssh/tencent_deploy_key" -P "$SSH_PORT" /tmp/hash_hex.txt "$TENCENT_USER@$TENCENT_HOST:/tmp/hash_hex.txt"

          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$TENCENT_HOST" 'bash -se' << 'ENDSCRIPT'
          set -eo pipefail

          DB=""
          for d in "$HOME/ai_study_platform/backend" "/root/ai_study_platform/backend"; do
            if [ -f "$d/app.db" ] 2>/dev/null; then DB="$d/app.db"; break; fi
          done
          echo "DB: $DB"

          # Use python3 to safely decode hex and update (avoids all shell escaping issues)
          python3 -c "
          import sqlite3
          hexhash = open('/tmp/hash_hex.txt').read().strip()
          hash_text = bytes.fromhex(hexhash).decode('utf-8')
          real_name_bytes = bytes.fromhex('E98085E6A3AEE6B7BC').decode('utf-8')
          c = sqlite3.connect('$DB')
          c.execute('UPDATE users SET hashed_password=?, is_admin=1, plan=?, admin_role=?, admin_real_name=? WHERE username=?',
            (hash_text, 'admin', 'super_admin', real_name_bytes, 'admin'))
          c.commit()
          r = c.execute('SELECT username,is_admin,plan,admin_role,admin_real_name FROM users WHERE username=?',('admin',)).fetchone()
          print(f'OK: {r[0]} is_admin={r[1]} plan={r[2]} admin_role={r[3]} real_name={r[4]}')
          c.close()
          "

          rm -f /tmp/hash_hex.txt
          sudo systemctl restart ai-backend
          sleep 3
          curl -s http://127.0.0.1/api/health
          ENDSCRIPT

          # Output password AFTER successful run
          echo ""
          echo "========== RESULT =========="
          echo "NEW_PASSWORD: $PW"
          echo "============================"