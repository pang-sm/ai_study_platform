name: 重置管理员密码
on:
  push:
    paths:
      - '.github/workflows/reset-admin-pwd.yml'

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?}" ; : "${TENCENT_SSH_KEY:?}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$TENCENT_SSH_KEY" > "$HOME/.ssh/tencent_deploy_key"
          chmod 600 "$HOME/.ssh/tencent_deploy_key"
          ssh-keyscan -p "$SSH_PORT" "$TENCENT_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Reset admin password
        shell: bash
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          SSH_PORT: ${{ secrets.TENCENT_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i "$HOME/.ssh/tencent_deploy_key" -p "$SSH_PORT" "$TENCENT_USER@$TENCENT_HOST" 'bash -se' <<'ENDSCRIPT'
          set -eo pipefail

          echo "=== 查找后端目录 ==="
          BACKEND_DIR=""
          for d in "$HOME/ai_study_platform/backend" "/root/ai_study_platform/backend"; do
            if [ -f "$d/auth.py" ] 2>/dev/null; then BACKEND_DIR="$d"; break; fi
          done
          if [ -z "$BACKEND_DIR" ]; then
            BACKEND_DIR=$(find "$HOME" /root -maxdepth 5 -name "auth.py" -path "*/backend/*" -type f 2>/dev/null | head -1 | xargs dirname)
          fi
          echo "后端目录: $BACKEND_DIR"

          DB="$BACKEND_DIR/app.db"
          echo "数据库: $DB"
          ls -la "$DB" || true

          # Find venv python
          PYTHON=""
          for c in "$BACKEND_DIR/.venv/bin/python3" "$BACKEND_DIR/../.venv/bin/python3" "/usr/bin/python3"; do
            if [ -x "$c" ] 2>/dev/null; then PYTHON="$c"; break; fi
          done
          echo "Python: $PYTHON"

          echo ""
          echo "=== 重置密码 ==="
          cat > /tmp/rp.py << PYEOF
import secrets, string, sys, os
sys.path.insert(0, "$BACKEND_DIR")
os.chdir("$BACKEND_DIR")
from auth import hash_password
import sqlite3
pw = "".join(secrets.choice(string.ascii_letters + string.digits) for _ in range(16))
h = hash_password(pw)
c = sqlite3.connect("$DB")
c.execute("UPDATE users SET hashed_password=?, is_admin=1, plan='admin', admin_role='super_admin', admin_real_name=X'E98085E6A3AEE6B7BC' WHERE username='admin'", (h,))
c.commit()
r = c.execute("SELECT username, is_admin, plan, admin_role, admin_real_name FROM users WHERE username='admin'").fetchone()
c.close()
print(f"User: {r[0]} is_admin={r[1]} plan={r[2]} admin_role={r[3]} real_name={r[4]}")
print(f"NEW_PASSWORD: {pw}")
PYEOF
          $PYTHON /tmp/rp.py

          echo ""
          echo "=== 重启 ==="
          sudo systemctl restart ai-backend
          sleep 3
          curl -s http://127.0.0.1/api/health
          rm -f /tmp/rp.py

          echo ""
          echo "=== 重启服务 ==="
          sudo systemctl restart ai-backend
          sleep 3
          sudo systemctl is-active ai-backend && echo "ACTIVE: yes" || echo "ACTIVE: no"
          curl -s http://127.0.0.1/api/health

          echo ""
          echo "=== 清理 ==="
          rm -f /tmp/reset_admin_pwd.py
          echo "临时脚本已删除"
          ENDSCRIPT